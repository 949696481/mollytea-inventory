<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0B3D33">
<title>库存登记 · MollyTea</title>
<style>
  :root {
    --bg-deep: #0B3D33;
    --bg-light: #1B6F5C;
    --gold-light: #F6D68A;
    --gold-dark: #C9963C;
    --paper: #F7F4EC;
    --paper-dim: #EDE8DA;
    --ink: #1E2A26;
    --ink-dim: #5B6B65;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: var(--bg-deep);
    background-image: radial-gradient(circle at 20% 0%, var(--bg-light) 0%, transparent 55%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  .card {
    max-width: 560px;
    width: 100%;
    background: var(--paper);
    border-radius: 24px;
    padding: 40px 32px;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  }
  .mark {
    width: 72px;
    height: 72px;
    border-radius: 18px;
    overflow: hidden;
    margin: 0 auto 20px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.25);
  }
  .mark img { width: 100%; height: 100%; display: block; object-fit: cover; }
  h1 {
    margin: 0 0 6px;
    font-size: 24px;
    color: var(--ink);
    letter-spacing: 0.3px;
  }
  .options {
    margin-top: 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    text-align: left;
  }
  @media (max-width: 480px) {
    .options { grid-template-columns: 1fr; }
  }
  .option {
    background: var(--paper-dim);
    border-radius: 16px;
    padding: 20px;
    display: flex;
    flex-direction: column;
  }
  .option .icon { font-size: 26px; margin-bottom: 8px; }
  .option h2 {
    margin: 0 0 6px;
    font-size: 15px;
    color: var(--ink);
  }
  .cta {
    display: block;
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--gold-light), var(--gold-dark));
    color: var(--bg-deep);
    font-weight: 700;
    font-size: 14px;
    text-decoration: none;
    text-align: center;
  }
  .cta.secondary {
    background: var(--paper);
    color: var(--ink);
    border: 1.5px solid var(--gold-dark);
  }
</style>
</head>
<body>
  <div class="card">
    <div class="mark"><img src="app/icon-192.png" alt="库存登记"></div>
    <h1>库存登记</h1>

    <div class="options">
      <div class="option">
        <div class="icon">🌐</div>
        <h2>在线版</h2>
        <a class="cta secondary" href="app/">打开 →</a>
      </div>
      <div class="option">
        <div class="icon">🖥️</div>
        <h2>下载 Windows 版</h2>
        <a class="cta" href="https://github.com/949696481/mollytea-inventory/releases/latest/download/InventoryApp-Windows.exe">下载 →</a>
      </div>
    </div>
  </div>
</body>
</html>
